      --brand:      #505AA7;
      --brand-600:  #444d92;
      --brand-050:  #eef0f9;
      --brand-100:  #dde1f3;
      --bg:   #f5f6fa;
      --card: #ffffff;
      --text: #191b22;
      --muted:#6b7080;
      --line: #e9eaf1;
      --radius: 18px;
      --shadow: 0 1px 2px rgba(24,27,42,.04), 0 10px 30px rgba(24,27,42,.06);
      --shadow-sm: 0 1px 2px rgba(24,27,42,.05), 0 4px 12px rgba(24,27,42,.05);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --brand:      #8b93df;
        --brand-600:  #a2a9e8;
        --brand-050:  #1b1e2b;
        --brand-100:  #262a3d;
        --bg:   #0e0f14;
        --card: #181a22;
        --text: #eef0f6;
        --muted:#98a0b3;
        --line: #262a35;
        --shadow: 0 1px 2px rgba(0,0,0,.3), 0 10px 30px rgba(0,0,0,.35);
        --shadow-sm: 0 1px 2px rgba(0,0,0,.3), 0 4px 12px rgba(0,0,0,.3);
      }
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      line-height: 1.55;
      word-break: keep-all;
      letter-spacing: -.01em;
    }
    a { color: inherit; }
    .logo { background: var(--logo) center / contain no-repeat; }  /* 원본 560×104 비율 → 각 위치서 명시 width */

    /* ── Sticky header ─────────────────────────── */
    header {
      position: sticky; top: 0; z-index: 30;
      height: 58px; display: flex; align-items: center; justify-content: center;
      padding: 0 20px;
      background: color-mix(in srgb, var(--bg) 78%, transparent);
      -webkit-backdrop-filter: saturate(180%) blur(12px);
      backdrop-filter: saturate(180%) blur(12px);
      border-bottom: 1px solid transparent;
      transition: border-color .2s;
    }
    header.scrolled { border-bottom-color: var(--line); }
    header .logo { height: 22px; width: 118px; display: block; opacity: 0; transition: opacity .25s; }
    header.scrolled .logo { opacity: 1; }
    @media (prefers-color-scheme: dark) { header .logo { filter: brightness(1.35) saturate(.8); } }

    /* ── Layout ────────────────────────────────── */
    .wrap { max-width: 600px; margin: 0 auto; padding: 0 18px calc(48px + env(safe-area-inset-bottom)); }

    .hero { text-align: center; padding: 22px 12px 24px; }
    .hero .logo { height: 28px; width: 151px; margin: 0 auto 18px; display: block; }
    @media (prefers-color-scheme: dark) { .hero .logo { filter: brightness(1.35) saturate(.8); } }
    .hero .eyebrow {
      display: inline-block; font-size: 12.5px; font-weight: 700; letter-spacing: .06em;
      color: var(--brand); background: var(--brand-050);
      padding: 5px 12px; border-radius: 999px; margin-bottom: 14px;
    }
    .hero h1 { margin: 0; font-size: 32px; font-weight: 800; letter-spacing: -.035em; }
    .hero p  { margin: 8px 0 0; color: var(--muted); font-size: 15.5px; }

    .card {
      background: var(--card); border: 1px solid var(--line);
      border-radius: var(--radius); box-shadow: var(--shadow-sm);
      overflow: hidden;
    }
    .card + .card { margin-top: 14px; }
    /* 연락(도착 안내) = 1차 행동 카드: 정보 카드보다 한 단계 위로 강조 */
    .call-card { border-color: var(--brand-100); box-shadow: var(--shadow); }

    /* ── Address ───────────────────────────────── */
    .addr { padding: 20px; }
    .toggle {
      display: inline-flex; background: var(--bg); border: 1px solid var(--line);
      border-radius: 999px; padding: 3px; gap: 2px; margin-bottom: 16px;
    }
    .toggle button {
      border: 0; background: transparent; color: var(--muted);
      font: inherit; font-size: 13px; font-weight: 600;
      padding: 6px 15px; border-radius: 999px; cursor: pointer; transition: .15s;
    }
    .toggle button.on { background: var(--card); color: var(--text); box-shadow: var(--shadow-sm); }

    .addr-row { display: flex; align-items: flex-start; gap: 14px; }
    .addr-row .value { flex: 1; min-width: 0; }
    .addr-row .value .line1 { font-size: 18px; font-weight: 700; letter-spacing: -.02em; }
    .addr-row .value .sub  { color: var(--muted); font-weight: 500; }
    .addr-row .value .line2 { font-size: 15px; color: var(--muted); margin-top: 3px; }
    .copy-btn {
      flex: none; width: 44px; height: 44px; border-radius: 12px;
      border: 1px solid var(--line); background: var(--bg); color: var(--text);
      cursor: pointer; display: grid; place-items: center; transition: .15s;
    }
    .copy-btn:hover { border-color: var(--brand-100); color: var(--brand); }
    .copy-btn:active { transform: scale(.94); }
    .copy-btn svg { width: 19px; height: 19px; }

    /* ── 지하철 안내 ───────────────────────────── */
    .subway {
      margin-top: 16px; padding-top: 14px;
      border-top: 1px solid var(--line);
      display: flex; flex-wrap: wrap; gap: 10px 20px;
    }
    .subway-row {
      flex: 1 1 230px;
      display: flex; align-items: center; gap: 8px; font-size: 14px;
    }
    .subway-row .badge {
      flex: none; width: 66px; height: 22px; padding: 0;
      border-radius: 999px; color: #fff; font-size: 11.5px; font-weight: 700;
      display: inline-flex; align-items: center; justify-content: center;
      letter-spacing: -.02em;
    }
    .subway-row .txt { color: var(--muted); }
    .subway-row .txt b { color: var(--text); font-weight: 600; }
    .subway-row .txt .walk { color: var(--brand); font-weight: 600; }

    /* ── Map ───────────────────────────────────── */
    #map { width: 100%; height: 320px; background: var(--brand-050); }
    @media (min-width: 700px) { #map { height: 380px; } }
    .map-fallback { display: none; padding: 34px 20px; text-align: center; color: var(--muted); font-size: 14.5px; }
    .map-fallback.show { display: block; }

    /* ── Call / arrival (highlight) ────────────── */
    .call {
      padding: 22px; display: flex; gap: 11px; align-items: flex-start;
      background: linear-gradient(180deg, var(--brand-050), transparent 70%);
    }
    .call .badge { flex: none; color: var(--brand); display: grid; place-items: center; margin-top: 2px; }
    .call .badge svg { width: 22px; height: 22px; }
    .call .call-desc { margin: 0; color: var(--text); font-weight: 500; font-size: 15px; }

    /* ── Generic section ───────────────────────── */
    .section { padding: 20px; }
    .section h2 { display: flex; align-items: center; gap: 9px; margin: 0 0 10px; font-size: 16px; font-weight: 700; }
    .section h2 .ic { width: 22px; height: 22px; color: var(--brand); flex: none; }
    .section .body { font-size: 15px; color: var(--muted); }
    .section .body p { margin: 0; }
    .section .body p + p { margin-top: 7px; }

    /* ── App buttons ───────────────────────────── */
    .apps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .app {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 9px; height: 96px; border-radius: 15px; text-decoration: none;
      font-size: 14px; font-weight: 700; line-height: 1.2; text-align: center;
      border: 1px solid var(--line); background: var(--card); color: var(--text);
      transition: .15s;
    }
    .app:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
    .app:active { transform: translateY(0); }
    .app .chip { width: 40px; height: 40px; border-radius: 12px; display: grid; place-items: center; }
    .app.naver .chip { background: #03c75a; }
    .app.kakao .chip { background: #ffe812; }
    .app.tmap  .chip { background: #1b1c1f; }
    .app .chip svg { width: 22px; height: 22px; }

    /* ── Toast ─────────────────────────────────── */
    .toast {
      position: fixed; left: 50%; bottom: calc(28px + env(safe-area-inset-bottom));
      transform: translate(-50%, 20px);
      background: #14161d; color: #fff; padding: 13px 20px; border-radius: 999px;
      font-size: 14.5px; font-weight: 600; opacity: 0; pointer-events: none;
      transition: all .28s cubic-bezier(.2,.7,.3,1); z-index: 60;
      box-shadow: 0 10px 30px rgba(0,0,0,.35); display: flex; align-items: center; gap: 8px;
    }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }
    .toast svg { width: 17px; height: 17px; }

    footer { text-align: center; color: var(--muted); font-size: 13px; padding: 30px 0 0; }
    footer .logo { display: inline-block; height: 15px; width: 81px; opacity: .5; vertical-align: -2px; margin-right: 6px; }
    @media (prefers-color-scheme: dark) { footer .logo { filter: brightness(1.4); } }
  </style>
</head>
<body>
  <header id="hdr"><span class="logo" role="img" aria-label="Schmidt"></span></header>

  <div class="wrap">
    <div class="hero">
      <span class="logo" role="img" aria-label="Schmidt"></span>
      <h1>오시는 길</h1>
    </div>

    <!-- 주소 -->
    <div class="card">
      <div class="addr">
        <div class="toggle">
          <button id="btn-road" class="on" type="button">도로명</button>
          <button id="btn-jibun" type="button">지번</button>
        </div>
        <div class="addr-row">
          <div class="value">
            <div class="line1" id="addr-line1">서울 성동구 뚝섬로1길 10 <span class="sub">(성수동1가)</span></div>
            <div class="line2">트러스톤빌딩 4층</div>
          </div>
          <button class="copy-btn" id="copy" type="button" aria-label="주소 복사">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          </button>
        </div>

        <!-- 지하철 안내 -->
        <div class="subway">
          <div class="subway-row">
            <span class="badge" style="background:#F5A200">수인분당선</span>
            <span class="txt"><b>서울숲역</b> 2번 출구 · <span class="walk">도보 3분</span></span>
          </div>
          <div class="subway-row">
            <span class="badge" style="background:#00A84D">2호선</span>
            <span class="txt"><b>뚝섬역</b> 6번 출구 · <span class="walk">도보 7분</span></span>
          </div>
        </div>
      </div>
    </div>

    <!-- 지도 -->
    <div class="card">
      <div id="map"></div>
      <div class="map-fallback" id="map-fallback">
        지도를 불러오지 못했습니다.<br>아래 <b>다른 앱에서 보기</b>로 위치를 확인해주세요.
      </div>
    </div>

    <!-- 도착 안내 / 전화 (강조) -->
    <div class="card call-card">
      <div class="call">
        <span class="badge">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3-8.6A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1 1 .4 1.9.7 2.8a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.3-1.2a2 2 0 0 1 2.1-.5c.9.3 1.8.6 2.8.7a2 2 0 0 1 1.7 2z"/></svg>
        </span>
        <p class="call-desc">건물 <b>1층에 도착하시면</b> 담당자에게 연락 부탁드립니다. 안내해 드리겠습니다.</p>
      </div>
    </div>

    <!-- 주차 -->
    <div class="card">
      <div class="section">
        <h2><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="4"/><path d="M9 17V7h4a3 3 0 0 1 0 6H9"/></svg>주차 가능</h2>
        <div class="body">
          <p>건물 뒤쪽 기계식 주차장에 별도 비용 없이 주차 가능합니다.</p>
          <p>담당자에게 차종(SUV 여부)과 함께 미리 말씀 부탁드립니다.</p>
        </div>
      </div>
    </div>

    <!-- 다른 앱에서 보기 -->
    <div class="card">
      <div class="section">
        <h2><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 20l-5.4 2.4a1 1 0 0 1-1.4-1V6a1 1 0 0 1 .6-.9L9 2m0 18 6-2.4M9 20V2m6 15.6 5.4 2.4a1 1 0 0 0 1.4-1V4a1 1 0 0 0-.6-.9L15 .7m0 16.9V.7"/></svg>다른 앱에서 길찾기</h2>
        <div class="apps">
          <a class="app naver" id="link-naver" href="#" target="_blank" rel="noopener" aria-label="네이버지도에서 길찾기 (새 창)">
            <span class="chip"><svg viewBox="0 0 24 24" fill="#fff"><path d="M4 3h5.2l5.4 8V3H20v18h-5.2L9.4 13v8H4z"/></svg></span>
            네이버지도
          </a>
          <a class="app kakao" id="link-kakao" href="#" target="_blank" rel="noopener" aria-label="카카오지도에서 길찾기 (새 창)">
            <span class="chip"><svg viewBox="0 0 24 24" fill="#3a1d1d"><path d="M12 3.2C6.9 3.2 3 6.5 3 10.5c0 2.6 1.8 4.9 4.5 6.2-.2.7-.7 2.5-.8 2.9-.1.5.2.5.4.4.3-.1 2.8-1.9 3.9-2.6.4 0 .7.1 1 .1 5.1 0 9-3.3 9-7.4S17.1 3.2 12 3.2z"/></svg></span>
            카카오지도
          </a>
          <a class="app tmap" id="link-tmap" href="#" target="_blank" rel="noopener" aria-label="티맵에서 길찾기 (새 창)">
            <span class="chip"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s7-6.3 7-11a7 7 0 1 0-14 0c0 4.7 7 11 7 11z"/><circle cx="12" cy="10" r="2.4"/></svg></span>
            티맵
          </a>
        </div>
      </div>
    </div>

    <footer><span class="logo" role="img" aria-label="Schmidt"></span></footer>
  </div>

  <div class="toast" id="toast">
    <svg viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
    주소가 복사되었습니다
  </div>

  <script>
    const ROAD_MAIN  = '서울 성동구 뚝섬로1길 10';
    const ROAD_FULL  = '서울 성동구 뚝섬로1길 10 (성수동1가)';
    const JIBUN_FULL = '서울 성동구 성수동1가 656-505';
    const DETAIL     = '트러스톤빌딩 4층';
    const PLACE_NAME = '슈미트';

    let currentCopy = ROAD_FULL;

    /* 도로명 / 지번 토글 */
    const line1 = document.getElementById('addr-line1');
    const bR = document.getElementById('btn-road'), bJ = document.getElementById('btn-jibun');
    bR.addEventListener('click', () => {
      line1.innerHTML = '서울 성동구 뚝섬로1길 10 <span class="sub">(성수동1가)</span>';
      bR.classList.add('on'); bJ.classList.remove('on'); currentCopy = ROAD_FULL;
    });
    bJ.addEventListener('click', () => {
      line1.textContent = JIBUN_FULL;
      bJ.classList.add('on'); bR.classList.remove('on'); currentCopy = JIBUN_FULL;
    });

    /* 복사 + 토스트 */
    const toast = document.getElementById('toast'); let tt;
    document.getElementById('copy').addEventListener('click', async () => {
      const text = currentCopy + ' ' + DETAIL;
      try { await navigator.clipboard.writeText(text); }
      catch (e) {
        const t = document.createElement('textarea');
        t.value = text; t.style.cssText = 'position:fixed;left:-9999px';
        document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t);
      }
      toast.classList.add('show'); clearTimeout(tt);
      tt = setTimeout(() => toast.classList.remove('show'), 2000);
    });

    /* 외부 지도 링크 */
    const q = encodeURIComponent(ROAD_MAIN);
    const lNaver = document.getElementById('link-naver');
    const lKakao = document.getElementById('link-kakao');
    const lTmap  = document.getElementById('link-tmap');
    lNaver.href = 'https://map.naver.com/p/search/' + q;
    lKakao.href = 'https://map.kakao.com/link/search/' + q;
    lTmap.href  = 'https://tmap.life/route?name=' + encodeURIComponent(PLACE_NAME);

    /* 헤더 스크롤 경계선 */
    const hdr = document.getElementById('hdr');
    const onScroll = () => hdr.classList.toggle('scrolled', window.scrollY > 8);
    onScroll(); window.addEventListener('scroll', onScroll, { passive: true });

    /* 카카오맵 */
    function initMap() {
      if (!(window.kakao && kakao.maps)) return failMap();
      kakao.maps.load(() => {
        const map = new kakao.maps.Map(document.getElementById('map'), {
          center: new kakao.maps.LatLng(37.5445, 127.0557), level: 3
        });
        new kakao.maps.services.Geocoder().addressSearch(ROAD_MAIN, (res, status) => {
          if (status !== kakao.maps.services.Status.OK || !res[0]) return;
          const lat = res[0].y, lng = res[0].x, pos = new kakao.maps.LatLng(lat, lng);
          map.setCenter(pos);
          const el = document.createElement('div');
          el.style.cssText = 'text-align:center;pointer-events:none';
          el.innerHTML =
            '<div style="display:inline-block;background:#fff;color:#505AA7;font-size:12.5px;font-weight:800;letter-spacing:-.01em;padding:5px 12px;border-radius:999px;margin-bottom:5px;box-shadow:0 4px 12px rgba(24,27,42,.2);white-space:nowrap;font-family:inherit">' + PLACE_NAME + '</div>' +
            '<svg width="30" height="38" viewBox="0 0 30 38" style="display:block;margin:0 auto;filter:drop-shadow(0 4px 5px rgba(80,90,167,.45))">' +
              '<path d="M15 0C6.72 0 0 6.6 0 14.8 0 25.9 15 38 15 38S30 25.9 30 14.8C30 6.6 23.28 0 15 0z" fill="#505AA7"/>' +
              '<circle cx="15" cy="14.6" r="5.4" fill="#fff"/>' +
            '</svg>';
          new kakao.maps.CustomOverlay({ map, position: pos, content: el, yAnchor: 1, xAnchor: 0.5, zIndex: 3 });
          lTmap.href = 'https://tmap.life/route?goalname=' + encodeURIComponent(PLACE_NAME) + '&goalx=' + lng + '&goaly=' + lat;
        });
      });
    }
    function failMap() {
      document.getElementById('map').style.display = 'none';
      document.getElementById('map-fallback').classList.add('show');
    }
    (function () {
      const s = document.createElement('script');
      s.src = 'https://dapi.kakao.com/v2/maps/sdk.js?appkey=1940cca016555fc54b17fba50ecb7da6&libraries=services&autoload=false';
      s.onload = initMap; s.onerror = failMap;
      document.head.appendChild(s);
    })();
  </script>
</body>
</html>
